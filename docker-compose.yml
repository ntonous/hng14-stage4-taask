version: "3.9"

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  app-logs:

services:
  app:
    image: swift-deploy-1-node:latest
    restart: unless-stopped
    environment:
      - MODE=canary
      - APP_VERSION=1.0.0
      - APP_PORT=3000
    expose:
      - "3000"
    networks:
      - swiftdeploy-net
    volumes:
      - app-logs:/app/logs
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - swiftdeploy-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
